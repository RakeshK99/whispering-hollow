<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Whispering Hollow</title>

  <meta property="og:title" content="Whispering Hollow" />
  <meta property="og:description" content="A tiny explorable grove full of hidden treasures — find them all." />
  <meta property="og:image" content="https://whispering-hollow.vercel.app/public/assets/ui/og-preview.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --color-bg-deep: #16281c;
      --color-parchment: #f0e6d2;
      --color-ink: #2b2018;
      --color-gold: #d4a24c;
      --font-display: 'Silkscreen', monospace;
      --font-body: 'Nunito', system-ui, sans-serif;
      --space-xs: 4px;
      --space-s: 8px;
      --space-m: 12px;
      --space-l: 16px;
      --space-xl: 24px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--color-bg-deep);
      color: var(--color-ink);
      font-family: var(--font-body);
      height: 100%;
    }

    #app {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: var(--space-l);
      flex-wrap: wrap;
      padding: var(--space-l);
      min-height: 100%;
    }

    #game-container {
      position: relative;
      width: 800px;
      max-width: 100%;
      flex-shrink: 0;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 800 / 600;
      background: var(--color-bg-deep);
      image-rendering: pixelated;
      border: 4px solid var(--color-gold);
      border-radius: 4px;
    }

    .panel {
      background: var(--color-parchment);
      color: var(--color-ink);
      border: 3px solid var(--color-ink);
      border-radius: 6px;
      padding: var(--space-m);
    }

    #sidebar {
      width: 260px;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-m);
    }

    #sidebar h1 {
      font-family: var(--font-display);
      font-size: 1rem;
      margin: 0 0 var(--space-s);
    }

    #progression {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
      margin-bottom: var(--space-s);
    }

    #sidebar-level-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: var(--space-s);
      flex-wrap: wrap;
    }

    #sidebar-level {
      font-family: var(--font-display);
      font-size: 0.75rem;
      color: var(--color-gold);
    }

    #sidebar-charms {
      font-size: 0.7rem;
      color: #5a4c38;
    }

    #sidebar-xp-track {
      height: 8px;
      border: 2px solid var(--color-ink);
      border-radius: 4px;
      background: rgba(43, 32, 24, 0.15);
      overflow: hidden;
    }

    #sidebar-xp-fill {
      height: 100%;
      width: 0%;
      background: var(--color-gold);
      transition: width 0.3s ease;
    }

    .charm-btn {
      font-family: var(--font-display);
      font-size: 0.7rem;
      padding: var(--space-s);
      border: 2px solid var(--color-ink);
      border-radius: 6px;
      background: #c264c9;
      color: var(--color-parchment);
      cursor: pointer;
      box-shadow: 0 3px 0 #954a9c;
    }

    .charm-btn[disabled] { opacity: 0.5; cursor: default; }

    .tabs {
      display: flex;
      gap: var(--space-xs);
    }

    .tab-button {
      flex: 1;
      background: var(--color-gold);
      color: var(--color-ink);
      border: 2px solid var(--color-ink);
      border-radius: 4px;
      padding: var(--space-xs) var(--space-s);
      font-family: var(--font-display);
      font-size: 0.7rem;
      cursor: pointer;
    }

    .tab-button:focus-visible,
    button:focus-visible {
      outline: 3px solid #ffffff;
      outline-offset: 2px;
    }

    .tab-button[aria-selected="false"] {
      background: transparent;
    }

    .tab-panel[hidden] { display: none; }

    #quest-log-list, #inventory-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }

    #quest-log-list li, #inventory-list li {
      font-size: 0.9rem;
      padding: var(--space-xs) 0;
      border-bottom: 1px solid rgba(43, 32, 24, 0.2);
    }

    .icon-row {
      display: flex;
      align-items: center;
      gap: var(--space-s);
    }

    .icon-row canvas {
      flex-shrink: 0;
      image-rendering: pixelated;
    }

    #color-picker {
      display: flex;
      gap: var(--space-xs);
    }

    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--color-ink);
      cursor: pointer;
      padding: 0;
    }

    .color-swatch[aria-pressed="true"] {
      box-shadow: 0 0 0 3px var(--color-gold);
    }

    .color-swatch-secret {
      box-shadow: 0 0 6px 1px var(--color-gold);
    }

    .color-swatch-secret[aria-pressed="true"] {
      box-shadow: 0 0 6px 1px var(--color-gold), 0 0 0 3px var(--color-gold);
    }

    #reset-progress {
      background: #a44a3f;
      color: var(--color-parchment);
      border: 2px solid var(--color-ink);
      border-radius: 4px;
      padding: var(--space-xs) var(--space-s);
      font-family: var(--font-display);
      font-size: 0.65rem;
      cursor: pointer;
      align-self: flex-start;
    }

    #dialogue-overlay {
      position: absolute;
      left: var(--space-l);
      right: var(--space-l);
      bottom: var(--space-l);
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }

    #dialogue-overlay[hidden] { display: none; }

    #intro-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 18, 12, 0.78);
      padding: var(--space-l);
    }

    #intro-overlay[hidden] { display: none; }

    #intro-card {
      max-width: 440px;
      text-align: center;
    }

    #intro-card h2 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      margin: 0 0 var(--space-m);
    }

    #intro-card p {
      line-height: 1.55;
      margin: 0 0 var(--space-m);
    }

    #intro-begin {
      font-family: var(--font-display);
      font-size: 0.8rem;
      padding: var(--space-s) var(--space-l);
      background: var(--color-gold);
      color: var(--color-ink);
      border: 2px solid var(--color-ink);
      border-radius: 5px;
      cursor: pointer;
      box-shadow: 0 4px 0 #a97e34;
      margin-top: var(--space-xs);
    }

    #world-select-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 18, 12, 0.78);
      padding: var(--space-l);
    }

    #world-select-overlay[hidden] { display: none; }

    #world-select-card {
      max-width: 460px;
      width: 100%;
      text-align: center;
    }

    #world-select-card h2 {
      font-family: var(--font-display);
      font-size: 1.2rem;
      margin: 0 0 var(--space-s);
    }

    #world-select-card > p {
      line-height: 1.5;
      margin: 0 0 var(--space-m);
    }

    #world-select-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-s);
    }

    .world-option {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
      text-align: left;
      background: rgba(240, 230, 210, 0.06);
      border: 2px solid var(--color-gold);
      border-radius: 6px;
      padding: var(--space-m);
      cursor: pointer;
      color: var(--color-parchment);
    }

    .world-option-name {
      font-family: var(--font-display);
      font-size: 0.95rem;
      color: var(--color-gold);
    }

    .world-option-tag {
      font-family: var(--font-display);
      font-size: 0.6rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #c7bfa8;
    }

    .world-option-status {
      font-family: var(--font-display);
      font-size: 0.6rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--color-gold);
    }

    .world-option-desc {
      font-size: 0.85rem;
      line-height: 1.4;
      color: #c7bfa8;
    }

    #dialogue-name {
      font-family: var(--font-display);
      font-size: 0.9rem;
      margin: 0;
    }

    #dialogue-text {
      margin: 0;
    }

    #building-overlay,
    #battle-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 18, 12, 0.78);
      padding: var(--space-l);
    }

    #building-overlay[hidden],
    #battle-overlay[hidden] { display: none; }

    #building-card,
    #battle-card {
      max-width: 620px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-m);
    }

    #building-canvas,
    #battle-canvas {
      width: 100%;
      height: auto;
      image-rendering: pixelated;
      border: 2px solid var(--color-ink);
      border-radius: 4px;
      display: block;
    }

    #building-title-row {
      display: flex;
      align-items: baseline;
      gap: var(--space-s);
      flex-wrap: wrap;
    }

    #building-name {
      font-family: var(--font-display);
      font-size: 1rem;
    }

    #building-world-tag {
      font-family: var(--font-display);
      font-size: 0.6rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #9a6b2e;
    }

    #building-host {
      font-size: 0.8rem;
      font-weight: 700;
      color: #9a6b2e;
    }

    #building-quest {
      margin: 0;
      line-height: 1.5;
    }

    #building-mini-row {
      background: #1b3020;
      border-radius: 6px;
      padding: var(--space-m) var(--space-l);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #building-mini-row .mini-label {
      font-family: var(--font-display);
      font-size: 0.6rem;
      letter-spacing: 1px;
      color: #8fa08c;
    }

    #building-mini-name {
      font-family: var(--font-display);
      font-size: 0.85rem;
      color: var(--color-parchment);
      margin-top: var(--space-xs);
    }

    #building-actions,
    #battle-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-m);
    }

    .action-btn {
      font-family: var(--font-display);
      font-size: 0.75rem;
      padding: var(--space-m) var(--space-xs);
      border: 2px solid var(--color-ink);
      border-radius: 6px;
      cursor: pointer;
      white-space: normal;
      line-height: 1.3;
      text-align: center;
    }

    #building-talk, #battle-bag { background: #d4a24c; color: var(--color-ink); box-shadow: 0 4px 0 #a97e34; }
    #building-play { background: #7ac97a; color: var(--color-ink); box-shadow: 0 4px 0 #5aa35a; }
    #building-leave {
      font-family: var(--font-display);
      font-size: 0.75rem;
      padding: var(--space-s) var(--space-xl);
      border: 2px solid var(--color-ink);
      border-radius: 6px;
      background: var(--color-ink);
      color: var(--color-parchment);
      cursor: pointer;
      align-self: center;
    }

    #battle-fight { background: #d95b5b; color: var(--color-parchment); box-shadow: 0 4px 0 #a83f3f; }
    #battle-switch { background: #4a90d9; color: var(--color-parchment); box-shadow: 0 4px 0 #356aa3; }
    #battle-run { background: #e7d9bd; color: var(--color-ink); box-shadow: 0 4px 0 #c3b191; }

    .action-btn[disabled] { opacity: 0.5; cursor: default; }

    #battle-message {
      min-height: 1.4em;
      margin: 0;
      line-height: 1.4;
    }

    #touch-controls {
      display: none;
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    body.touch #touch-controls {
      display: block;
    }

    #dpad {
      position: absolute;
      left: var(--space-l);
      bottom: var(--space-l);
      display: grid;
      grid-template-columns: repeat(3, 48px);
      grid-template-rows: repeat(3, 48px);
      gap: var(--space-xs);
      pointer-events: auto;
    }

    #dpad button {
      background: rgba(240, 230, 210, 0.85);
      border: 2px solid var(--color-ink);
      border-radius: 6px;
      font-size: 1.2rem;
    }

    #dpad-up { grid-column: 2; grid-row: 1; }
    #dpad-left { grid-column: 1; grid-row: 2; }
    #dpad-right { grid-column: 3; grid-row: 2; }
    #dpad-down { grid-column: 2; grid-row: 3; }

    #interact-button {
      position: absolute;
      right: var(--space-l);
      bottom: var(--space-l);
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--color-gold);
      border: 2px solid var(--color-ink);
      font-weight: 700;
      pointer-events: auto;
    }

    #challenge-button {
      position: absolute;
      right: calc(var(--space-l) + 76px);
      bottom: calc(var(--space-l) + 12px);
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #d95b5b;
      color: var(--color-parchment);
      border: 2px solid var(--color-ink);
      font-weight: 700;
      pointer-events: auto;
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="game-container">
      <canvas id="game-canvas" width="800" height="600" aria-label="Whispering Hollow game view"></canvas>

      <div id="dialogue-overlay" class="panel" hidden>
        <p id="dialogue-name"></p>
        <p id="dialogue-text"></p>
      </div>

      <div id="intro-overlay" hidden>
        <div id="intro-card" class="panel">
          <h2 id="intro-title"></h2>
          <div id="intro-paragraphs"></div>
          <button id="intro-begin" type="button">Begin</button>
        </div>
      </div>

      <div id="world-select-overlay" hidden>
        <div id="world-select-card" class="panel">
          <h2>Choose a Path</h2>
          <p>The portal hums, ready to open onto a world you haven't seen yet — or lead you back to one you have.</p>
          <div id="world-select-list"></div>
        </div>
      </div>

      <div id="building-overlay" hidden>
        <div id="building-card" class="panel">
          <canvas id="building-canvas" width="560" height="320"></canvas>
          <div id="building-title-row">
            <span id="building-name"></span>
            <span id="building-world-tag"></span>
          </div>
          <div id="building-host"></div>
          <p id="building-quest"></p>
          <div id="building-mini-row">
            <div>
              <div class="mini-label">MINI-GAME</div>
              <div id="building-mini-name"></div>
            </div>
            <span aria-hidden="true" style="font-family: var(--font-display); font-size: 1.2rem; color: var(--color-gold);">★</span>
          </div>
          <div id="building-actions">
            <button id="building-talk" type="button" class="action-btn">TALK</button>
            <button id="building-play" type="button" class="action-btn">PLAY</button>
          </div>
          <button id="building-charm" type="button" class="charm-btn" hidden>USE CHARM</button>
          <button id="building-leave" type="button">LEAVE</button>
        </div>
      </div>

      <div id="battle-overlay" hidden>
        <div id="battle-card" class="panel">
          <canvas id="battle-canvas" width="540" height="300"></canvas>
          <p id="battle-message"></p>
          <div id="battle-actions">
            <button id="battle-fight" type="button" class="action-btn">FIGHT</button>
            <button id="battle-bag" type="button" class="action-btn">BAG</button>
            <button id="battle-switch" type="button" class="action-btn">SWITCH</button>
            <button id="battle-run" type="button" class="action-btn">RUN</button>
          </div>
          <button id="battle-charm" type="button" class="charm-btn" hidden>USE CHARM</button>
        </div>
      </div>

      <div id="touch-controls">
        <div id="dpad">
          <button id="dpad-up" type="button" aria-label="Move up">▲</button>
          <button id="dpad-left" type="button" aria-label="Move left">◀</button>
          <button id="dpad-right" type="button" aria-label="Move right">▶</button>
          <button id="dpad-down" type="button" aria-label="Move down">▼</button>
        </div>
        <button id="challenge-button" type="button" aria-label="Challenge">vs</button>
        <button id="interact-button" type="button" aria-label="Interact">talk</button>
      </div>
    </div>

    <aside id="sidebar" class="panel">
      <h1>Whispering Hollow</h1>

      <div id="progression">
        <div id="sidebar-level-row">
          <span id="sidebar-level">Explorer · Lv 1</span>
          <span id="sidebar-charms">0 charms · 0/11 trinkets</span>
        </div>
        <div id="sidebar-xp-track">
          <div id="sidebar-xp-fill"></div>
        </div>
      </div>

      <div class="tabs" role="tablist">
        <button id="tab-quest" class="tab-button" role="tab" aria-selected="true" aria-controls="panel-quest">Quest Log</button>
        <button id="tab-inventory" class="tab-button" role="tab" aria-selected="false" aria-controls="panel-inventory">Inventory</button>
      </div>

      <div id="panel-quest" class="tab-panel" role="tabpanel" aria-labelledby="tab-quest">
        <ul id="quest-log-list"></ul>
      </div>

      <div id="panel-inventory" class="tab-panel" role="tabpanel" aria-labelledby="tab-inventory" hidden>
        <ul id="inventory-list"></ul>
      </div>

      <div>
        <p style="margin: 0 0 var(--space-xs); font-weight: 600;">Color</p>
        <div id="color-picker"></div>
      </div>

      <div style="display: flex; gap: var(--space-xs);">
        <button id="mute-toggle" type="button" class="tab-button" aria-pressed="false">SOUND: ON</button>
        <button id="reset-progress" type="button">Reset Progress</button>
      </div>
    </aside>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
